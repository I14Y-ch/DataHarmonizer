services:
  app:
    build: .
    container_name: dataharmonizer_app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "5000"
    volumes:
      - app_logs:/app/backend/logs
    networks:
      - dataharmonizer_net

  nginx:
    image: nginx:1.25-alpine
    container_name: dataharmonizer_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - dataharmonizer_net

  certbot:
    image: certbot/certbot:latest
    container_name: dataharmonizer_certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  app_logs:
  certbot_www:

networks:
  dataharmonizer_net:
    driver: bridge
