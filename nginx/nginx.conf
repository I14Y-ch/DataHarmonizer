# HTTP – redirect all traffic to HTTPS and handle ACME challenges
server {
    listen 80;
    server_name govtech.watts-drive.ch;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS – reverse proxy to Gunicorn
server {
    listen 443 ssl;
    server_name govtech.watts-drive.ch;

    ssl_certificate     /etc/nginx/certs/live/govtech.watts-drive.ch/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/govtech.watts-drive.ch/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://app:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
